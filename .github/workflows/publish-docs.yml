name: Publish Docs

on:
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install quartodoc interlinks filter
        run: python -m quartodoc interlinks
        working-directory: docs
      
      - name: Sync notebooks
        run: python scripts/sync_notebooks.py
        working-directory: docs

      - name: Generate tutorials index
        run: python scripts/generate_tutorials_index.py
        working-directory: docs

      - name: add extension
        run: quarto add machow/quartodoc --no-prompt
        working-directory: docs

      - name: Build Quartodoc
        run: quartodoc build
        working-directory: docs

      - name: Render and publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
