project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - docs/get-started/*.qmd
    - docs/tutorials/*.qmd
    - docs/reference/*.qmd
    - notebooks/model_demos/*.ipynb
    - notebooks/functionality_demos/*.ipynb
  pre-render:
    - python scripts/inject_doc_figures.py

filters:
  - "interlinks"

interlinks:
  fast: true
  autolink: true
  sources:
    numpy:
      url: https://numpy.org/doc/stable/
    python:
      url: https://docs.python.org/3/
    pyleoclim:
      url: https://pyleoclim-util.readthedocs.io/en/latest/


website:
  title: "PaleoBeasts"
  description: "Synthetic paleoclimate signal models"
  favicon: thumbnails/paleobeasts_logo.png
  page-navigation: true

  navbar:
    left:
      - text: Get Started
        href: docs/get-started/installation.qmd
      - text: Tutorials
        href: docs/tutorials/index.qmd
      - text: Reference
        href: docs/reference/index.qmd
  
    right:
      - icon: github
        href: https://github.com/LinkedEarth/PaleoBeasts
  
  sidebar:
    - id: get-started
      title: Get Started
      style: floating
      align: left
      contents:
        - docs/get-started/overview.qmd
        - section: "Basic Use"
          contents:
          - docs/get-started/installation.qmd
          - docs/get-started/quickstart.qmd

        - section: "Package Design"
          contents:
          - section: "Core Components"
            contents:
            - docs/get-started/concepts.qmd
            - docs/get-started/models.qmd

          - section: "Utilities"
            contents:
              - docs/get-started/downsampling.qmd
              - docs/get-started/noise.qmd
              - docs/get-started/solvers.qmd


    - id: tutorials
      title: Tutorials
      style: docked
      contents:
        - docs/tutorials/index.qmd
        - section: "Model demos"
          contents:
            - notebooks/model_demos/lorenz63.ipynb
            - notebooks/model_demos/lorenz96.ipynb
            - notebooks/model_demos/ebm_demo.ipynb
            - notebooks/model_demos/Ganopolski2024_demo.ipynb
        - section: "Functionality demos"
          contents:
            - notebooks/functionality_demos/noise_demo.ipynb
            - notebooks/functionality_demos/model_noise_demo.ipynb
            - notebooks/functionality_demos/downsample_demo.ipynb

metadata-files:
  - docs/reference/_sidebar.yml

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    css:
      - docs/reference/_styles-quartodoc.css
      - docs/styles.css

quartodoc:
  style: pkgdown
  dir: docs/reference
  package: paleobeasts
  render_interlinks: true
  renderer:
    style: markdown
    table_style: description-list  
  # parser: numpy
  # source_url: "https://github.com/LinkedEarth/PaleoBeasts/blob/main/"
  sidebar: "docs/reference/_sidebar.yml"
  css: "docs/reference/_styles-quartodoc.css"

  sections:
    - title: Core
      desc: |
        Base classes underlying all models.
      contents:
        - core.PBModel
        - core.PBOutput
        - core.Forcing

    - title: Models

    - subtitle: EBMs
      desc: |
        Energy balance models.
      contents:
        - EBMBase
        - EBM0D
        - EBM1DLat

    - subtitle: Box Models
      desc: |
        Composable framework for building custom multi-reservoir models.
      contents:
        - BoxModelSpec
        - TwoBoxCarbon

    - subtitle: Lorenz & Roessler
      desc: |
        Single-scale & two-scale Lorenz atmospheric models + Roessler system.
      contents:
        - Lorenz63
        - Lorenz96
        - Roessler

    - subtitle: Pendulums & Oscillators
      desc: Mechanical oscillators ranging from simple SHM to chaotic driven pendulums.
      contents:
        - SimplePendulum
        - DrivenPendulum
        - DoublePendulum
        - DampedSpring

    - subtitle: Individual Models
      desc: |
        Standalone paleoclimate and dynamical systems models.
      contents:
        - Daisyworld
        - ENSORechargeOscillator
        - Model3
        - Stocker2003BipolarSeesaw
        - Stocker2003ExtendedSeaIceSeesaw
        - Stommel

    - title: Utils

    - subtitle: Noise
      desc: Post-hoc observation noise and stochastic process noise generation.
      contents:
        - utils.noise.from_series
        - utils.noise.from_param

    - subtitle: Resampling
      desc: |
        Irregular downsampling utilities for paleoclimate time series.
      contents:
        - utils.resample.downsample

    - subtitle: Forcing
      desc: |
        Factory functions for common Forcing patterns.
      contents:
        - utils.forcing_utils.create_periodic_forcing_function
        - utils.forcing_utils.create_periodic_forcing
        - utils.forcing_utils.create_constant_forcing
        - utils.forcing_utils.create_sinusoid_forcing
        - utils.forcing_utils.create_piecewise_forcing

    - subtitle: Solvers
      desc: |
        Numerical integration backends and solver helpers.
      contents:
        - utils.solver.Solution
        - utils.solver.rk4_method
        - utils.solver.euler_method
        - utils.solver.euler_maruyama_method
        - utils.solver.define_t_eval
        - utils.solver.validate_monotonic_grid
        - utils.solver.validate_layer_thicknesses
        - utils.solver.flux_divergence
        - utils.solver.validate_initial_state
        - utils.solver.build_state_from_history

    - subtitle: Functions
      desc: |
        Signal processing and interpolation utilities.
      contents:
        - utils.func.make_derivative_func
        - utils.func.smooth_and_interpolate
